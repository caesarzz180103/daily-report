<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZZ Daily Report</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="container header glass">
      <div>
        <h1>ZZ Daily Report</h1>
        <p id="meta">加载中...</p>
      </div>
      <div class="controls">
        <select id="langSelect" aria-label="language">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="vi">Tiếng Việt</option>
        </select>
        <input id="search" type="search" placeholder="搜索标题 / 标签 / 来源" />
        <select id="sortBy">
          <option value="importance">按重要度</option>
          <option value="time">按时间</option>
        </select>
      </div>
    </header>

    <main class="container">
      <section class="summary-grid" id="summaryGrid"></section>

      <section>
        <h2 id="summaryTitle">每小时摘要</h2>
        <div class="panel glass" id="hourlySummary">加载中...</div>
      </section>

      <section>
        <h2 id="topTitle">重点事件（Top 5）</h2>
        <div id="topList" class="list"></div>
      </section>

      <section>
        <h2 id="newsTitle">快讯列表</h2>
        <div id="list" class="list"></div>
      </section>

      <section>
        <h2 id="historyTitle">历史归档（最近更新）</h2>
        <div id="history" class="panel glass">加载中...</div>
      </section>
    </main>

    <footer class="container footer">
      <p id="footerText">Data sources are public/free. Always verify with original source before making decisions.</p>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
